<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>JobFinderNet - Smart AI-Powered Job Matching</title>
    <meta name="description" content="AI-powered job board with smart matching, resume parsing, and cover letter generation. Find your next opportunity with personalized recommendations." />
    <meta name="keywords" content="job search, AI matching, resume parser, cover letter generator, career, employment, job board, smart matching" />
    <meta name="author" content="JobFinderNet" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph -->
    <meta property="og:title" content="JobFinderNet - Smart AI-Powered Job Matching" />
    <meta property="og:description" content="AI-powered job board with smart matching, resume parsing, and cover letter generation." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://jobfindernet.com" />
    <meta property="og:site_name" content="JobFinderNet" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="JobFinderNet - Smart AI-Powered Job Matching" />
    <meta name="twitter:description" content="AI-powered job board with smart matching, resume parsing, and cover letter generation." />

    <!-- Canonical -->
    <link rel="canonical" href="https://jobfindernet.com" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@400;500&display=swap" rel="stylesheet">

    <!-- Apply saved theme before render to avoid a flash of the wrong theme -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('theme');
          if (!t) {
            t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          }
          document.documentElement.setAttribute('data-theme', t);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
