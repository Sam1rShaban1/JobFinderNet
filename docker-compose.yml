services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: JobFinderDb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redisdata:/data
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  mailpit:
    image: axllent/mailpit
    ports:
      - "1025:1025"
      - "8025:8025"
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ASPNETCORE_URLS: "http://+:8080"
    env_file: ./src/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      target: development
    depends_on:
      - api
    volumes:
      - ./client/src:/app/src
      - ./client/public:/app/public
    restart: unless-stopped

  client-prod:
    build:
      context: ./client
      dockerfile: Dockerfile
      target: production
    depends_on:
      - api
    profiles: ["prod"]
    restart: unless-stopped

  nginx:
    build: ./nginx
    depends_on:
      api:
        condition: service_healthy
      client:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
    environment:
      - CLIENT_PORT=${CLIENT_PORT:-5173}
      - DOMAIN=${DOMAIN:-localhost}
      - LETSENCRYPT_EMAIL=${LETSENCRYPT_EMAIL:-}
    volumes:
      - certbot-www:/var/www/certbot
      - certbot-etc:/etc/letsencrypt
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  tests:
    build:
      context: .
      dockerfile: Dockerfile.test
    environment:
      ASPNETCORE_ENVIRONMENT: Testing
    profiles: ["test"]
    restart: "no"

volumes:
  pgdata:
  redisdata:
  certbot-www:
  certbot-etc:
