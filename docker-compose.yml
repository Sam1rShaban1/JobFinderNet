services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: JobFinderDb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    depends_on:
      postgres:
        condition: service_started
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"

  mailpit:
    image: axllent/mailpit
    ports:
      - "1025:1025"
      - "8025:8025"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
    env_file: ./src/.env

  client:
    build:
      context: ./client
      target: development
    depends_on:
      api:
        condition: service_started
    volumes:
      - ./client/src:/app/src
      - ./client/public:/app/public

  nginx:
    build: ./nginx
    depends_on:
      client:
        condition: service_started
      api:
        condition: service_started
    ports:
      - "80:80"
    environment:
      CLIENT_PORT: "5173"

volumes:
  pgdata:
  redisdata:
